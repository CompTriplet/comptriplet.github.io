<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href="style.css"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body>  
        <div class = "menubuttons">
            <a href = "index.html" class = "colorMenu">Home</a>
            <a href = "about.html" class = "colorMenu">About</a>
            <a href = "projects.html" class = "colorMenu">Projects</a>
            <a href = "contact.html" class = "colorMenu">Contact</a>
        </div>
        <header style = "text-align: center;">
            <h1>About me</h1>
            <form>
                I am proficient in many programming languages such as
                <select class = ".rotating-select">
                  <option value="Java">Java</option>
                  <option value="Python">Python</option>
                  <option value="HTML">HTML</option>
                  <option value="CSS">CSS</option>
                  <option value="C">C</option>
                  <option value="JavaScript">JavaScript</option>
                  <option value="SQL">SQL</option>
                  <option value="R">R</option>
                </select>
              </form>
            <p id = "whereUsed"></p>
            <form> I am familar with sofware and tools such as
                <select class = ".rotating-select">
                    <option>Git</option>
                    <option>Visual Code Studio</option>
                    <option>React</option>
                    <option>Github</option>
                    <option>Github Copilot</option>
                    <option>Pandas</option>
                    <option>Jupyter Notebook</option>
                    <option>Numpy</option>
                </select>
            </form>
            <p id = "whereUsed"></p>
            <form> I am interested in creating 
                <select class = ".rotating-select">
                    <option>AI Workflows</option>
                    <option>Data Driven Solution</option>
                    <option>Innovative Technology</option>
                </select>
            </form>
            <script>
                // Get all select elements with the rotating-select class
                const selectElements = document.querySelectorAll('.rotating-select');

                // Apply rotation to each select element
                selectElements.forEach((selectElement) => {
                const options = selectElement.querySelectorAll('option');
                let currentIndex = 0;
              
                // Rotate options every 2 seconds
                //setInterval() to rotate through options every 2 seconds (2000ms)
                setInterval(() => {
                  currentIndex = (currentIndex + 1) % options.length;
                  selectElement.selectedIndex = currentIndex;
                }, 2000);
            });
            </script>
            <p id = "whereUsed"></p>
        </header>
    </body> 
</html>
